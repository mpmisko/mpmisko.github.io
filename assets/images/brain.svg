<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1024"/>
      <stop offset="1" stop-color="#1f1147"/>
    </linearGradient>
    <linearGradient id="accent" x1="15" y1="15" x2="85" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.45" stop-color="#f97316"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <radialGradient id="glow" cx="50" cy="50" r="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Badge background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="40" fill="url(#glow)"/>

  <!-- Decorative neurons hinting at a wider network -->
  <g fill="#f59e0b" fill-opacity="0.35">
    <circle cx="12" cy="50" r="1.4"/>
    <circle cx="88" cy="50" r="1.4"/>
    <circle cx="50" cy="12" r="1.4"/>
    <circle cx="50" cy="88" r="1.4"/>
    <circle cx="20" cy="20" r="1"/>
    <circle cx="80" cy="20" r="1"/>
    <circle cx="20" cy="80" r="1"/>
    <circle cx="80" cy="80" r="1"/>
  </g>

  <!-- Faint cross connections behind the M -->
  <g stroke="url(#accent)" stroke-width="1" stroke-linecap="round" stroke-opacity="0.45">
    <line x1="25" y1="25" x2="75" y2="75"/>
    <line x1="75" y1="25" x2="25" y2="75"/>
    <line x1="25" y1="25" x2="75" y2="25"/>
    <line x1="25" y1="75" x2="75" y2="75"/>
  </g>

  <!-- M backbone: BL -> TL -> center dip -> TR -> BR -->
  <path d="M25 75 L25 25 L50 60 L75 25 L75 75"
        stroke="url(#accent)" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Nodes at each vertex -->
  <g fill="url(#accent)" stroke="#0b1024" stroke-width="1.5">
    <circle cx="25" cy="25" r="5"/>
    <circle cx="75" cy="25" r="5"/>
    <circle cx="50" cy="60" r="5"/>
    <circle cx="25" cy="75" r="5"/>
    <circle cx="75" cy="75" r="5"/>
  </g>
</svg>
