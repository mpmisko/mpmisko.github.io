# Site settings
title: "Michal Pandy"
title_left: "Michal "
title_right: "Pandy" # default: ""
description: "Michal Pandy" # site description
keywords: "Business, Founders, Artificial Intelligence, Machine learning, Robotics, College admissions, Self-driving vehicles"
url: https://mpmisko.github.io # site url
baseurl: "" # apply repo name like "/myproject" if used under gh-pages branch, else (under master branch) just leave empty/blank
cover: "/assets/images/curiosity.svg" # image uri like logo/cover image for site seo
favicon: "/assets/images/curiosity.svg" # site favicon

google_analytics: G-CH67VSC667
twitter_username: "@michal_pandy"
postshare_enabled: true

# Build settings
permalink: /:title/
markdown: kramdown
highlighter: rouge
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

source: ./
destination: ./_site

# Sass configuration
sass:
  sass_dir: assets/scss
  style: compressed # expanded

# Author settings
author:
  name: "Michal Pándy"

plugins:
  - jekyll-sitemap
  - bourbon
  - jekyll-paginate

include:
  - assets/images/world_model_rollout.gif
  - assets/images/world_model_imagination.gif

# navbar pages
navbar:
  - slug: about
    title: About
  - slug: blog
    title: Blog

exclude:
  - "gulp"
  - "node_modules"
  - "bower"
  - "bower_components"
  - "config.rb"
  - "src"
  - "Gemfile"
  - "Gemfile.lock"
  - ".rvmrc"
  - ".rbenv-version"
  - "package.json"
  - "gulpfile.js"
  - "README.md"
  - "Rakefile"
  - "changelog.md"
  - "script"
  - "vendor"
  - "thinkspace.gemspec"
